<svg width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#0050DD"/>
    </linearGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Speed gauge arc (outer) -->
  <path d="M 262 662 A 300 300 0 1 1 762 662"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="48" stroke-linecap="round"/>

  <!-- Speed gauge arc (filled portion) -->
  <path d="M 262 662 A 300 300 0 1 1 712 412"
        fill="none" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round"/>

  <!-- Tick marks -->
  <line x1="262" y1="662" x2="300" y2="640" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="220" y1="462" x2="260" y2="472" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="362" y1="272" x2="378" y2="308" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="512" y1="220" x2="512" y2="260" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="662" y1="272" x2="646" y2="308" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="804" y1="462" x2="764" y2="472" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="762" y1="662" x2="724" y2="640" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>

  <!-- Needle pointing to ~75% (upper right area) -->
  <line x1="512" y1="512" x2="690" y2="330" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>

  <!-- Center circle -->
  <circle cx="512" cy="512" r="32" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="18" fill="url(#bg)"/>

  <!-- Down arrow -->
  <g transform="translate(370, 720)">
    <polygon points="0,-24 -20,4 -8,4 -8,24 8,24 8,4 20,4" fill="#30D158"/>
    <text x="0" y="54" fill="#FFFFFF" font-family="-apple-system, Helvetica" font-size="48" font-weight="bold" text-anchor="middle">DL</text>
  </g>

  <!-- Up arrow -->
  <g transform="translate(654, 720)">
    <polygon points="0,24 -20,-4 -8,-4 -8,-24 8,-24 8,-4 20,-4" fill="#30D158"/>
    <text x="0" y="54" fill="#FFFFFF" font-family="-apple-system, Helvetica" font-size="48" font-weight="bold" text-anchor="middle">UL</text>
  </g>
</svg>
