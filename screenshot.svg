<svg width="320" height="360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#1e1e22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="360" rx="12" fill="url(#bg)"/>

  <!-- Current speeds -->
  <text x="20" y="32" fill="#8e8e93" font-size="11">Download</text>
  <text x="20" y="56" fill="#ffffff" font-size="22" font-weight="bold">349.2 Mbps</text>

  <text x="300" y="32" fill="#8e8e93" font-size="11" text-anchor="end">Upload</text>
  <text x="300" y="56" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="end">401.5 Mbps</text>

  <!-- Chart area -->
  <rect x="20" y="76" width="280" height="140" rx="4" fill="#1a1a1e"/>

  <!-- Y-axis labels -->
  <text x="16" y="90" fill="#8e8e93" font-size="9" text-anchor="end">500</text>
  <text x="16" y="125" fill="#8e8e93" font-size="9" text-anchor="end">350</text>
  <text x="16" y="160" fill="#8e8e93" font-size="9" text-anchor="end">200</text>
  <text x="16" y="195" fill="#8e8e93" font-size="9" text-anchor="end">50</text>

  <!-- Grid lines -->
  <line x1="20" y1="88" x2="300" y2="88" stroke="#333338" stroke-width="0.5"/>
  <line x1="20" y1="123" x2="300" y2="123" stroke="#333338" stroke-width="0.5"/>
  <line x1="20" y1="158" x2="300" y2="158" stroke="#333338" stroke-width="0.5"/>
  <line x1="20" y1="193" x2="300" y2="193" stroke="#333338" stroke-width="0.5"/>

  <!-- Download line (blue) -->
  <polyline
    points="28,118 56,122 84,115 112,120 140,112 168,125 196,108 224,116 252,110 280,114"
    fill="none" stroke="#0a84ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upload line (green) -->
  <polyline
    points="28,105 56,108 84,102 112,110 140,100 168,112 196,96 224,104 252,98 280,102"
    fill="none" stroke="#30d158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- X-axis labels -->
  <text x="50" y="210" fill="#8e8e93" font-size="9" text-anchor="middle">10:00</text>
  <text x="130" y="210" fill="#8e8e93" font-size="9" text-anchor="middle">10:30</text>
  <text x="210" y="210" fill="#8e8e93" font-size="9" text-anchor="middle">11:00</text>
  <text x="280" y="210" fill="#8e8e93" font-size="9" text-anchor="middle">11:30</text>

  <!-- Legend -->
  <circle cx="110" cy="72" r="4" fill="#0a84ff"/>
  <text x="118" y="75" fill="#8e8e93" font-size="10">Download</text>
  <circle cx="190" cy="72" r="4" fill="#30d158"/>
  <text x="198" y="75" fill="#8e8e93" font-size="10">Upload</text>

  <!-- Divider -->
  <line x1="20" y1="228" x2="300" y2="228" stroke="#38383c" stroke-width="1"/>

  <!-- Run Test Now button -->
  <text x="20" y="252" fill="#ffffff" font-size="13">Run Test Now</text>

  <!-- Interval picker -->
  <text x="20" y="282" fill="#8e8e93" font-size="11">Interval:</text>
  <rect x="80" y="270" width="52" height="20" rx="4" fill="#38383c"/>
  <text x="106" y="284" fill="#8e8e93" font-size="11" text-anchor="middle">5 min</text>
  <rect x="134" y="270" width="52" height="20" rx="4" fill="#0a84ff"/>
  <text x="160" y="284" fill="#ffffff" font-size="11" text-anchor="middle">15 min</text>
  <rect x="188" y="270" width="52" height="20" rx="4" fill="#38383c"/>
  <text x="214" y="284" fill="#8e8e93" font-size="11" text-anchor="middle">30 min</text>
  <rect x="242" y="270" width="52" height="20" rx="4" fill="#38383c"/>
  <text x="268" y="284" fill="#8e8e93" font-size="11" text-anchor="middle">60 min</text>

  <!-- Divider -->
  <line x1="20" y1="304" x2="300" y2="304" stroke="#38383c" stroke-width="1"/>

  <!-- Quit -->
  <text x="20" y="328" fill="#ffffff" font-size="13">Quit</text>
</svg>
